<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>⏳ Focus Timer</h2>

  <div class="timer">
    <svg width="220" height="220">
      <circle cx="110" cy="110" r="90"></circle>
      <circle cx="110" cy="110" r="90" id="progress"></circle>
    </svg>
    <div id="time">1:00</div>
  </div>

  <!-- Presets -->
  <div class="presets">
    <button onclick="setTime(30)">30s</button>
    <button onclick="setTime(60)">1m</button>
    <button onclick="setTime(120)">2m</button>
    <button onclick="setTime(300)">5m</button>
    <button onclick="setTime(1800)">30m</button>
    <button onclick="setTime(3600)">1h</button>
  </div>

  <!-- Controls -->
  <div class="buttons">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    <button onclick="toggleMusic()">Music On/Off</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
